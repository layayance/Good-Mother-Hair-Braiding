<div class="coiffures">
  <h1 class="title">Nos styles populaires ✨</h1>

  <div class="stats">
    <div class="card" *ngFor="let item of coiffures">
      <figure class="image-card">

        <img
          [src]="item.img"
          [alt]="'coiffures.' + item.key + '.alt' | translate"
        >

        <figcaption>
          {{ 'coiffures.' + item.key + '.label' | translate }}
        </figcaption>

      </figure>
    </div>
  </div>
</div>
